spring:
  application:
    name: notification-service
  profiles:
    active: dev
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: notification-service-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.type.mapping: "cityMetrics:com.urbanpulse.model.CityMetrics"
        spring.json.trusted.packages: "*"
        spring.json.use.type.headers: false
        spring.json.value.default.type: com.urbanpulse.model.CityMetrics
    topic:
      processed-city-data: processed-city-data

server:
  port: 8083
  servlet:
    context-path: /

logging:
  level:
    root: INFO
    com.urbanpulse: DEBUG

urbanpulse:
  notification:
    # Max alerts to keep in memory
    max-alerts: 100
    # Max alerts to keep per city
    max-city-alerts: 20
    # Max cities to track
    max-cities: 50
